name = "RealLike"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["RealLike"]

[leanOptions]
pp.unicode.fun = true                 # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "PhysLean"
git = "https://github.com/Oscario0/physlib"
rev = "master"

[[require]]
name = "LeanBisection"
git = "https://github.com/Oscario0/LeanBisection"
rev = "a45f480"

[[require]]
name = "BET"
git = "https://github.com/ATOMSLab/LeanBET"
rev = "main"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "RealLike"
